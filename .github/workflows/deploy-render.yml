name: CD - Deploy to Render

on:
  workflow_run:
    workflows: ["CI - Tests"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render deploys
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger deploys through Render API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          EX91_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_EX91_FLASK }}
          EX92_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_EX92_FASTAPI }}
          EX93_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_EX93_HELLO_FLASK }}
          EX94_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_EX94_FLASK_RESTFUL }}
        run: |
          set -euo pipefail

          if [ -z "${RENDER_API_KEY:-}" ]; then
            echo "::error::Missing GitHub secret RENDER_API_KEY"
            exit 1
          fi

          trigger_deploy() {
            local service_name="$1"
            local service_id="$2"

            if [ -z "${service_id:-}" ]; then
              echo "::warning::Skipping ${service_name}: service id secret is empty"
              return 0
            fi

            echo "Triggering deploy for ${service_name} (${service_id})"

            curl -fsS \
              --request POST \
              --url "https://api.render.com/v1/services/${service_id}/deploys" \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Accept: application/json" \
              --header "Content-Type: application/json" \
              --data '{"clearCache":"do_not_clear"}'

            echo ""
          }

          trigger_deploy "Exercicio 9.1 - Flask" "$EX91_SERVICE_ID"
          trigger_deploy "Exercicio 9.2 - FastAPI" "$EX92_SERVICE_ID"
          trigger_deploy "Exercicio 9.3 - Flask Hello" "$EX93_SERVICE_ID"
          trigger_deploy "Exercicio 9.4 - Flask RESTful" "$EX94_SERVICE_ID"
