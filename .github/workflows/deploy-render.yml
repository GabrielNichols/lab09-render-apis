name: CD - Render Blueprint Auto Deploy

on:
  workflow_run:
    workflows: ["CI - Tests"]
    types: [completed]
  workflow_dispatch:

jobs:
  explain-blueprint-deploy:
    name: Confirm Render Blueprint deployment flow
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Explain deployment
        run: |
          cat <<'MSG'
          CI passed.

          Deploy is managed by Render Blueprint using render.yaml.
          Each service has:
            autoDeployTrigger: checksPass

          Therefore, after this GitHub check passes, Render will deploy the Blueprint-managed services automatically.

          For initial setup, create the Blueprint once in Render:
            New + > Blueprint > select repo > render.yaml > Deploy Blueprint
          MSG
