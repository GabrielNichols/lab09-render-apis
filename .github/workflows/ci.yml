name: CI - Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test ${{ matrix.app.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app:
          - name: ex91-flask
            path: exercicio_9_1_flask
          - name: ex92-fastapi
            path: exercicio_9_2_fastapi
          - name: ex93-flask-render
            path: exercicio_9_3_render_hello_flask
          - name: ex94-flask-restful-render
            path: exercicio_9_4_render_flask_restful

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ${{ matrix.app.path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ${{ matrix.app.path }}
        run: pytest -q
