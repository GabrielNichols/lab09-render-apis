name: Infra - Validate Render Blueprint

on:
  push:
    branches: [main]
    paths:
      - render.yaml
      - .github/workflows/infra-validate-render.yml
  pull_request:
    branches: [main]
    paths:
      - render.yaml
      - .github/workflows/infra-validate-render.yml
  workflow_dispatch:

jobs:
  validate-render-yaml:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate render.yaml with Render API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_OWNER_ID: ${{ secrets.RENDER_OWNER_ID }}
        run: |
          set -euo pipefail

          if [ -z "${RENDER_API_KEY:-}" ] || [ -z "${RENDER_OWNER_ID:-}" ]; then
            echo "::error::Missing RENDER_API_KEY or RENDER_OWNER_ID secrets"
            exit 1
          fi

          echo "Validating render.yaml against Render workspace ${RENDER_OWNER_ID}"

          curl -fsS \
            --request POST \
            --url "https://api.render.com/v1/blueprints/validate" \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Accept: application/json" \
            --form "ownerId=${RENDER_OWNER_ID}" \
            --form "file=@render.yaml" \
            --output blueprint-validation.json

          python -m json.tool blueprint-validation.json
